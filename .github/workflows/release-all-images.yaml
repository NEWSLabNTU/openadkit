name: release-all-images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      autoware_tag:
        description: The Autoware tag to release
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX_COMMON: ghcr.io/${{ github.repository_owner }}/openadkit-common
  IMAGE_PREFIX_COMPONENT: ghcr.io/${{ github.repository_owner }}/openadkit
  BAKE_FILE: components/docker-bake.hcl

jobs:
  detect-autoware-tag:
    name: Detect latest Autoware release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      autoware_tag: ${{ steps.latest.outputs.tag }}
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate manual tag format
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "${{ inputs.autoware_tag }}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || (echo "Invalid tag format '${{ inputs.autoware_tag }}': must be X.Y.Z" && exit 1)

      - name: Get latest upstream semver tag (e.g. 1.2.3)
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.autoware_tag }}"
          else
            tags_json=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/autowarefoundation/autoware/tags?per_page=3")
            tag=$(
              echo "$tags_json" \
              | jq -r '.[].name' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1
            )
          fi
          [ -n "$tag" ] || (echo "No semver tag found" && exit 1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Tag: $tag"

      - name: Cache lookup for processed tag
        id: cache
        uses: actions/cache@v4
        with:
          path: .autoware-tag-marker
          key: autoware-tag-${{ steps.latest.outputs.tag }}
          restore-keys: |
            autoware-tag-

      - name: Decide whether to run
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — forcing run for tag ${{ steps.latest.outputs.tag }}"
          elif [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Already processed tag ${{ steps.latest.outputs.tag }}"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "New tag detected: ${{ steps.latest.outputs.tag }}"
          fi

      - name: Create marker (so cache gets saved)
        if: steps.decide.outputs.should_run == 'true'
        run: |
          mkdir -p .autoware-tag-marker
          echo "${{ steps.latest.outputs.tag }}" > .autoware-tag-marker/tag.txt
          
  # =============================================================================
  # Stage 1: Build common images
  # =============================================================================
  build-common:
    runs-on: ubuntu-22.04
    needs: detect-autoware-tag
    if: needs.detect-autoware-tag.outputs.should_run == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install jq and vcs2l
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-pip
          pip install --no-cache-dir vcs2l
        shell: bash

      - name: Checkout OpenADKit repository
        uses: actions/checkout@v6

      - name: Checkout Autoware repository
        uses: actions/checkout@v6
        with:
          repository: autowarefoundation/autoware
          ref: ${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          path: autoware
          fetch-depth: 1
    
      - name: Pull Autoware Source
        run: |
            mkdir -p autoware/src
            vcs import --shallow autoware/src < autoware/repositories/autoware.repos
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for openadkit-common:base
        id: meta-common-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX_COMMON }}
          bake-target: docker-metadata-action-common-base
          tags: |
            type=raw,value=base-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          flavor: |
            latest=false

      - name: Extract metadata for openadkit-common:base-cuda
        id: meta-common-base-cuda
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX_COMMON }}
          bake-target: docker-metadata-action-common-base-cuda
          tags: |
            type=raw,value=base-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          flavor: |
            latest=false

      - name: Extract metadata for openadkit-common:devel
        id: meta-common-devel
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX_COMMON }}
          bake-target: docker-metadata-action-common-devel
          tags: |
            type=raw,value=devel-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          flavor: |
            latest=false

      - name: Extract metadata for openadkit-common:devel-cuda
        id: meta-common-devel-cuda
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX_COMMON }}
          bake-target: docker-metadata-action-common-devel-cuda
          tags: |
            type=raw,value=devel-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          flavor: |
            latest=false

      - name: Build and push common images
        uses: docker/bake-action@v5
        with:
          files: |
            ${{ env.BAKE_FILE }}
            ${{ steps.meta-common-base.outputs.bake-file }}
            ${{ steps.meta-common-base-cuda.outputs.bake-file }}
            ${{ steps.meta-common-devel.outputs.bake-file }}
            ${{ steps.meta-common-devel-cuda.outputs.bake-file }}
          targets: |
            common-base
            common-base-cuda
            common-devel
            common-devel-cuda
          push: true
          set: |
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:common-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:common-main,mode=max

  # =============================================================================
  # Stage 2: Build component images (parallel)
  # =============================================================================
  build-components:
    runs-on: ubuntu-22.04
    needs: [build-common, detect-autoware-tag]
    if: needs.detect-autoware-tag.outputs.should_run == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: sensing-perception
          - target: sensing-perception-cuda
          - target: localization-mapping
          - target: planning-control
          - target: vehicle-system
          - target: api
          - target: visualizer
          - target: simulator
    steps:
      - name: Install jq and vcs2l
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-pip
          pip install --no-cache-dir vcs2l
        shell: bash

      - name: Checkout OpenADKit repository
        uses: actions/checkout@v6

      - name: Checkout Autoware repository
        uses: actions/checkout@v6
        with:
          repository: autowarefoundation/autoware
          ref: ${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          path: autoware
          fetch-depth: 1
    
      - name: Pull Autoware Source
        run: |
            mkdir -p autoware/src
            vcs import --shallow autoware/src < autoware/repositories/autoware.repos
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.target }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX_COMPONENT }}
          bake-target: docker-metadata-action-${{ matrix.target }}
          tags: |
            type=raw,value=${{ matrix.target }}-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          flavor: |
            latest=false

      - name: Build and push ${{ matrix.target }}
        uses: docker/bake-action@v5
        with:
          files: |
            ${{ env.BAKE_FILE }}
            ${{ steps.meta.outputs.bake-file }}
          targets: ${{ matrix.target }}
          push: true
          set: |
            *.args.COMMON_BASE_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:base-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.COMMON_BASE_CUDA_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:base-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.COMMON_DEVEL_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:devel-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.COMMON_DEVEL_CUDA_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:devel-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-main,mode=max

  # =============================================================================
  # Stage 3: Build universe and universe-cuda images (parallel)
  # =============================================================================
  build-universe:
    runs-on: ubuntu-22.04
    needs: [detect-autoware-tag, build-common, build-components]
    if: needs.detect-autoware-tag.outputs.should_run == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: universe
          - target: universe-cuda
    steps:
      - name: Install jq and vcs2l
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-pip
          pip install --no-cache-dir vcs2l
        shell: bash

      - name: Checkout OpenADKit repository
        uses: actions/checkout@v6

      - name: Checkout Autoware repository
        uses: actions/checkout@v6
        with:
          repository: autowarefoundation/autoware
          ref: ${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          path: autoware
          fetch-depth: 1
    
      - name: Pull Autoware Source
        run: |
            mkdir -p autoware/src
            vcs import --shallow autoware/src < autoware/repositories/autoware.repos
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for ${{ matrix.target }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX_COMPONENT }}
          bake-target: docker-metadata-action-${{ matrix.target }}
          tags: |
            type=raw,value=${{ matrix.target }}-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
          flavor: |
            latest=false

      - name: Build and push ${{ matrix.target }}
        uses: docker/bake-action@v5
        with:
          files: |
            ${{ env.BAKE_FILE }}
            ${{ steps.meta.outputs.bake-file }}
          targets: ${{ matrix.target }}
          push: true
          set: |
            *.args.COMMON_BASE_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:base-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.COMMON_BASE_CUDA_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:base-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.COMMON_DEVEL_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:devel-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.COMMON_DEVEL_CUDA_IMAGE=${{ env.IMAGE_PREFIX_COMMON }}:devel-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.SENSING_PERCEPTION_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:sensing-perception-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.SENSING_PERCEPTION_CUDA_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:sensing-perception-cuda-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.LOCALIZATION_MAPPING_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:localization-mapping-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.PLANNING_CONTROL_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:planning-control-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.VEHICLE_SYSTEM_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:vehicle-system-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.API_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:api-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.VISUALIZER_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:visualizer-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.args.SIMULATOR_IMAGE=${{ env.IMAGE_PREFIX_COMPONENT }}:simulator-${{ needs.detect-autoware-tag.outputs.autoware_tag }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-main,mode=max
